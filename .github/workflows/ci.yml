name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        # Live OpenAI tests auto-skip without ROCKY_OPENAI_APIKEY, keeping CI hermetic.
        run: swift test
