name: BYOKitDemo
options:
  bundleIdPrefix: com.byokit.demo
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
packages:
  BYOKit:
    path: ..
targets:
  BYOKitDemo:
    type: application
    platform: [iOS, macOS]
    sources: [Sources]
    dependencies:
      - package: BYOKit
        product: BYOKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: BYOKit
